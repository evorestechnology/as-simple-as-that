<!DOCTYPE html>
<html lang="en" class="h-full" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AST — As Simple As That | Designer Paradise</title>
    <!-- Tailwind CSS v4 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"> </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Bulletproof theme variable overrides */
        :root, html[data-theme="light"] {
            --bg-color: #f4f4f5; /* zinc-100 */
            --text-main: #09090b; /* zinc-950 */
            --text-muted: #71717a; /* zinc-500 */
            --border-color: #e4e4e7; /* zinc-200 */
            --card-shadow: 0 24px 60px -15px rgba(0,0,0,0.06);
        }

        html[data-theme="dark"] {
            --bg-color: #09090b; /* zinc-950 */
            --text-main: #f4f4f5; /* zinc-100 */
            --text-muted: #a1a1aa; /* zinc-400 */
            --border-color: #27272a; /* zinc-800 */
            --card-shadow: 0 24px 60px -15px rgba(0,0,0,0.6);
        }

        /* Applying the core theme classes smoothly */
        .theme-body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
        }
        .theme-text-muted { color: var(--text-muted); }
        .theme-border { border-color: var(--border-color); }
        .theme-card-shadow { box-shadow: var(--card-shadow); }

        /* Conditional visibility depending on custom data-theme attribute */
        html[data-theme="light"] .show-dark { display: none !important; }
        html[data-theme="dark"] .show-light { display: none !important; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
    
    <script>
        // Check local storage or system preference instantly before screen paints
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
            document.documentElement.setAttribute('data-theme', 'dark');
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>
</head>
<body class="theme-body h-full flex flex-col justify-between selection:bg-zinc-200 dark:selection:bg-zinc-800">

    <!-- Header / Navigation -->
    <header class="w-full max-w-7xl mx-auto px-6 py-6 md:py-8 flex justify-between items-center opacity-0 animate-fade-in">
        <!-- Text-Based Minimalist Premium Logo -->
        <div class="flex items-center space-x-1.5">
            <span class="text-sm md:text-base font-semibold uppercase tracking-[0.25em]">
                As Simple As That
            </span>
            <span class="h-1.5 w-1.5 rounded-full bg-current self-end mb-1"></span>
        </div>

        <!-- Dynamic Theme Toggle Button -->
        <button 
            id="theme-toggle" 
            aria-label="Toggle theme"
            class="p-2.5 rounded-xl border theme-border bg-zinc-500/5 hover:bg-zinc-500/10 transition-all duration-200 cursor-pointer text-current"
        >
            <!-- Sun Icon (Visible only in Dark Mode) -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 show-dark">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m0 13.5V21M4.22 4.22l1.56 1.56m12.44 12.44l1.56 1.56M21 12h-2.25M5.25 12H3m14.28-6.78l-1.56 1.56M6.36 17.64l-1.56 1.56M12 6.75a5.25 5.25 0 100 10.5 5.25 5.25 0 000-10.5z" />
            </svg>
            <!-- Moon Icon (Visible only in Light Mode) -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 show-light">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
            </svg>
        </button>
    </header>

    <!-- Main Section -->
    <main class="w-full max-w-7xl mx-auto px-6 py-4 md:py-12 flex flex-col lg:flex-row lg:items-center lg:justify-between gap-12 flex-grow">
        
        <!-- Left Side: Luxury Brand Copy -->
        <div class="space-y-8 lg:max-w-xl opacity-0 animate-fade-in" style="animation-delay: 0.15s;">
            <div class="space-y-4">
                <!-- Large Bold Coming Soon Statement -->
                <h2 class="text-2xl sm:text-3xl font-bold tracking-[0.35em] theme-text-muted uppercase">
                    COMING SOON
                </h2>
                <div class="space-y-2">
                    <h1 class="text-4xl sm:text-5xl md:text-6xl font-light tracking-tight leading-[1.1] uppercase">
                        Designer Paradise
                    </h1>
                    <p class="text-lg md:text-xl font-normal tracking-wide theme-text-muted italic">
                        A New Chapter in the World of Fashion Design.
                    </p>
                </div>
            </div>

            <hr class="border-b theme-border border-t-0 max-w-xs" />

            <!-- Brand Pillars / Value Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 pt-2">
                <div class="space-y-1">
                    <p class="text-xs uppercase tracking-widest font-semibold theme-text-muted">Pillar 01</p>
                    <p class="text-sm font-medium tracking-wide uppercase">Premium Quality</p>
                </div>
                <div class="space-y-1 sm:border-x theme-border sm:px-4">
                    <p class="text-xs uppercase tracking-widest font-semibold theme-text-muted">Pillar 02</p>
                    <p class="text-sm font-medium tracking-wide uppercase">Designers Choice</p>
                </div>
                <div class="space-y-1 sm:pl-4">
                    <p class="text-xs uppercase tracking-widest font-semibold theme-text-muted">Pillar 03</p>
                    <p class="text-sm font-medium tracking-wide uppercase">Luxury Experience</p>
                </div>
            </div>

            <!-- Launch Tagline -->
            <p class="text-xs font-semibold tracking-[0.2em] theme-text-muted uppercase pt-4">
                Launching Soon — Stay Tuned
            </p>
        </div>

        <!-- Right Side: Responsive Poster Showcase -->
        <div class="w-full lg:w-auto flex justify-center lg:justify-end opacity-0 animate-fade-in" style="animation-delay: 0.3s;">
            <div class="relative w-full max-w-[320px] sm:max-w-[360px] md:max-w-[400px] aspect-[3/4] bg-zinc-800 rounded-2xl overflow-hidden border theme-border theme-card-shadow transform hover:scale-[1.01] transition-transform duration-500 ease-out">
                <!-- Light Mode Poster image -->
                <img 
                    src="poster_light.png" 
                    alt="AST Designer Paradise Light Poster" 
                    class="w-full h-full object-cover show-light"
                >
                <!-- Dark Mode Poster image -->
                <img 
                    src="poster_dark.png" 
                    alt="AST Designer Paradise Dark Poster" 
                    class="w-full h-full object-cover show-dark"
                >
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full max-w-7xl mx-auto px-6 py-6 md:py-8 flex flex-col sm:flex-row justify-between items-center text-xs tracking-widest theme-text-muted space-y-4 sm:space-y-0 opacity-0 animate-fade-in" style="animation-delay: 0.45s;">
        <p>&copy; 2026 assimpleasthat.shop</p>
        <div class="flex items-center space-x-6">
            <span class="text-[10px] uppercase font-bold tracking-[0.2em] opacity-60">Follow Us For Updates</span>
            <a href="#" class="hover:text-zinc-900 dark:hover:text-white transition-colors uppercase">Instagram</a>
            <a href="#" class="hover:text-zinc-900 dark:hover:text-white transition-colors uppercase">Pinterest</a>
        </div>
    </footer>

    <!-- Bulletproof Theme Switcher Engine -->
    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        
        toggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            
            if (currentTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        });
    </script>
</body>
</html>
