<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>As Simple As That — Coming Soon</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"> </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
    <script>
        // Inline script to prevent theme flashing on load
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-50 h-full flex flex-col justify-between transition-colors duration-300 selection:bg-zinc-200 dark:selection:bg-zinc-800">

    <!-- Header / Navigation -->
    <header class="w-full max-w-7xl mx-auto px-6 py-6 md:py-8 flex justify-between items-center opacity-0 animate-fade-in">
        <!-- Brand Logos -->
        <div class="flex items-center">
            <!-- Light Mode Logo (Visible if HTML doesn't have .dark) -->
            <img 
                src="logo_light.jpeg" 
                alt="As Simple As That Logo" 
                class="h-8 md:h-10 w-auto object-contain dark:hidden"
            >
            <!-- Dark Mode Logo (Visible if HTML has .dark) -->
            <img 
                src="logo_dark.png" 
                alt="As Simple As That Logo" 
                class="h-8 md:h-10 w-auto object-contain hidden dark:block"
            >
        </div>

        <!-- Interactive Theme Toggle Button -->
        <button 
            id="theme-toggle" 
            aria-label="Toggle theme"
            class="p-2 rounded-xl bg-zinc-200/50 dark:bg-zinc-900/50 border border-zinc-200 dark:border-zinc-800 text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 transition-all duration-200 cursor-pointer"
        >
            <!-- Sun Icon (shows in dark mode) -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 hidden dark:block">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m0 13.5V21M4.22 4.22l1.56 1.56m12.44 12.44l1.56 1.56M21 12h-2.25M5.25 12H3m14.28-6.78l-1.56 1.56M6.36 17.64l-1.56 1.56M12 6.75a5.25 5.25 0 100 10.5 5.25 5.25 0 000-10.5z" />
            </svg>
            <!-- Moon Icon (shows in light mode) -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 block dark:hidden">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
            </svg>
        </button>
    </header>

    <!-- Main Section -->
    <main class="w-full max-w-7xl mx-auto px-6 py-4 md:py-12 flex flex-col lg:flex-row lg:items-center lg:justify-between gap-12 flex-grow">
        
        <!-- Text Block -->
        <div class="space-y-6 lg:max-w-xl opacity-0 animate-fade-in" style="animation-delay: 0.15s;">
            <div class="space-y-3">
                <span class="inline-block text-xs font-semibold tracking-[0.25em] text-zinc-400 dark:text-zinc-500 uppercase">
                    Coming Soon
                </span>
                <h1 class="text-4xl sm:text-5xl md:text-6xl font-normal tracking-tight leading-[1.1] text-zinc-900 dark:text-zinc-100">
                    Less noise.<br>More of what <span class="italic font-light text-zinc-500 dark:text-zinc-400">matters</span>.
                </h1>
            </div>
            <p class="text-zinc-500 dark:text-zinc-400 text-base md:text-lg font-light leading-relaxed max-w-md">
                We are building a highly curated online shopping destination stripped entirely of complexity. Essentials, refined.
            </p>
        </div>

        <!-- Poster Showcase (Responsive sizing for mobile up to large desktop screens) -->
        <div class="w-full lg:w-auto flex justify-center lg:justify-end opacity-0 animate-fade-in" style="animation-delay: 0.3s;">
            <div class="relative w-full max-w-[320px] sm:max-w-[360px] md:max-w-[400px] aspect-[3/4] bg-zinc-100 dark:bg-zinc-900 rounded-2xl overflow-hidden shadow-[0_24px_60px_-15px_rgba(0,0,0,0.1)] dark:shadow-[0_24px_60px_-15px_rgba(0,0,0,0.5)] border border-zinc-200/80 dark:border-zinc-800/80 transform hover:scale-[1.01] transition-transform duration-500 ease-out">
                <!-- Light Mode Poster -->
                <img 
                    src="poster_light.png" 
                    alt="Coming Soon Collection Poster" 
                    class="w-full h-full object-cover dark:hidden"
                >
                <!-- Dark Mode Poster -->
                <img 
                    src="poster_dark.png" 
                    alt="Coming Soon Collection Poster" 
                    class="w-full h-full object-cover hidden dark:block"
                >
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full max-w-7xl mx-auto px-6 py-6 md:py-8 flex flex-col sm:flex-row justify-between items-center text-xs tracking-wide text-zinc-400 dark:text-zinc-600 space-y-4 sm:space-y-0 opacity-0 animate-fade-in" style="animation-delay: 0.45s;">
        <p>&copy; 2026 assimpleasthat.shop</p>
        <div class="flex space-x-8">
            <a href="#" class="hover:text-zinc-800 dark:hover:text-zinc-300 transition-colors">Instagram</a>
            <a href="#" class="hover:text-zinc-800 dark:hover:text-zinc-300 transition-colors">Pinterest</a>
        </div>
    </footer>

    <!-- Theme Toggle Switch Logic -->
    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        
        toggleBtn.addEventListener('click', () => {
            // Check current explicit mode or system state
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
        });
    </script>
</body>
</html>
