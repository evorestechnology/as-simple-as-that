<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AST — As Simple As That | Designer Paradise</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
    <script>
        // Inline script to prevent theme flashing on load
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-50 h-full flex flex-col justify-between transition-colors duration-300 selection:bg-zinc-200 dark:selection:bg-zinc-800">

    <!-- Header / Navigation -->
    <header class="w-full max-w-7xl mx-auto px-6 py-6 md:py-8 flex justify-between items-center opacity-0 animate-fade-in">
        <!-- Logo Element with standard Premium White Background Container -->
        <div class="flex items-center">
            <div class="h-12 w-12 md:h-14 md:w-14 rounded-full bg-white flex items-center justify-center shadow-md border border-zinc-200/60 dark:border-zinc-800/40 p-2.5 transition-transform duration-300 hover:scale-105">
                <img 
                    src="asat_logo.png" 
                    alt="AST Logo" 
                    class="h-full w-full object-contain"
                >
            </div>
        </div>

        <!-- Interactive Theme Toggle Button -->
        <button 
            id="theme-toggle" 
            aria-label="Toggle theme"
            class="p-2 rounded-xl bg-zinc-200/50 dark:bg-zinc-900/50 border border-zinc-200 dark:border-zinc-800 text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 transition-all duration-200 cursor-pointer"
        >
            <!-- Sun Icon (shows in dark mode) -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 hidden dark:block">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m0 13.5V21M4.22 4.22l1.56 1.56m12.44 12.44l1.56 1.56M21 12h-2.25M5.25 12H3m14.28-6.78l-1.56 1.56M6.36 17.64l-1.56 1.56M12 6.75a5.25 5.25 0 100 10.5 5.25 5.25 0 000-10.5z" />
            </svg>
            <!-- Moon Icon (shows in light mode) -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 block dark:hidden">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
            </svg>
        </button>
    </header>

    <!-- Main Section -->
    <main class="w-full max-w-7xl mx-auto px-6 py-4 md:py-12 flex flex-col lg:flex-row lg:items-center lg:justify-between gap-12 flex-grow">
        
        <!-- Left Side: Luxury Brand Copy -->
        <div class="space-y-8 lg:max-w-xl opacity-0 animate-fade-in" style="animation-delay: 0.15s;">
            <div class="space-y-4">
                <!-- Large Bold Coming Soon Statement -->
                <h2 class="text-2xl sm:text-3xl font-bold tracking-[0.35em] text-zinc-400 dark:text-zinc-500 uppercase">
                    COMING SOON
                </h2>
                <div class="space-y-2">
                    <h1 class="text-4xl sm:text-5xl md:text-6xl font-light tracking-tight leading-[1.1] text-zinc-900 dark:text-zinc-100 uppercase">
                        Designer Paradise
                    </h1>
                    <p class="text-lg md:text-xl font-normal tracking-wide text-zinc-500 dark:text-zinc-400 italic">
                        A New Chapter in the World of Fashion Design.
                    </p>
                </div>
            </div>

            <hr class="border-zinc-200 dark:border-zinc-900 max-w-xs" />

            <!-- Brand Pillars / Value Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 pt-2">
                <div class="space-y-1">
                    <p class="text-xs uppercase tracking-widest font-semibold text-zinc-400 dark:text-zinc-500">Pillar 01</p>
                    <p class="text-sm font-medium tracking-wide uppercase text-zinc-800 dark:text-zinc-200">Premium Quality</p>
                </div>
                <div class="space-y-1 sm:border-x sm:border-zinc-200 sm:dark:border-zinc-900 sm:px-4">
                    <p class="text-xs uppercase tracking-widest font-semibold text-zinc-400 dark:text-zinc-500">Pillar 02</p>
                    <p class="text-sm font-medium tracking-wide uppercase text-zinc-800 dark:text-zinc-200">Designers Choice</p>
                </div>
                <div class="space-y-1 sm:pl-4">
                    <p class="text-xs uppercase tracking-widest font-semibold text-zinc-400 dark:text-zinc-500">Pillar 03</p>
                    <p class="text-sm font-medium tracking-wide uppercase text-zinc-800 dark:text-zinc-200">Luxury Experience</p>
                </div>
            </div>

            <!-- Launch Tagline -->
            <p class="text-xs font-semibold tracking-[0.2em] text-zinc-400 dark:text-zinc-600 uppercase pt-4">
                Launching Soon — Stay Tuned
            </p>
        </div>

        <!-- Right Side: Responsive Poster Showcase -->
        <div class="w-full lg:w-auto flex justify-center lg:justify-end opacity-0 animate-fade-in" style="animation-delay: 0.3s;">
            <div class="relative w-full max-w-[320px] sm:max-w-[360px] md:max-w-[400px] aspect-[3/4] bg-zinc-100 dark:bg-zinc-900 rounded-2xl overflow-hidden shadow-[0_24px_60px_-15px_rgba(0,0,0,0.08)] dark:shadow-[0_24px_60px_-15px_rgba(0,0,0,0.6)] border border-zinc-200/80 dark:border-zinc-800/80 transform hover:scale-[1.01] transition-transform duration-500 ease-out">
                <!-- Light Mode Poster image -->
                <img 
                    src="poster_light.png" 
                    alt="AST Designer Paradise Light Poster" 
                    class="w-full h-full object-cover dark:hidden"
                >
                <!-- Dark Mode Poster image -->
                <img 
                    src="poster_dark.png" 
                    alt="AST Designer Paradise Dark Poster" 
                    class="w-full h-full object-cover hidden dark:block"
                >
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full max-w-7xl mx-auto px-6 py-6 md:py-8 flex flex-col sm:flex-row justify-between items-center text-xs tracking-widest text-zinc-400 dark:text-zinc-600 space-y-4 sm:space-y-0 opacity-0 animate-fade-in" style="animation-delay: 0.45s;">
        <p>&copy; 2026 assimpleasthat.shop</p>
        <div class="flex items-center space-x-6">
            <span class="text-[10px] uppercase font-bold text-zinc-300 dark:text-zinc-800 tracking-[0.2em]">Follow Us For Updates</span>
            <a href="#" class="hover:text-zinc-800 dark:hover:text-zinc-300 transition-colors uppercase">Instagram</a>
            <a href="#" class="hover:text-zinc-800 dark:hover:text-zinc-300 transition-colors uppercase">Pinterest</a>
        </div>
    </footer>

    <!-- Theme Toggle Logic -->
    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        
        toggleBtn.addEventListener('click', () => {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
        });
    </script>
</body>
</html>
